<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .perspective-1000 { perspective: 1000px; }
        .card-rotate-left { transform: rotateY(-15deg) rotateX(5deg) scale(0.95); }
        .card-rotate-right { transform: rotateY(15deg) rotateX(5deg) scale(0.95); }
        .card-center { transform: translateZ(20px); }
        .glass-effect { backdrop-filter: blur(8px); background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-6 w-full max-w-md mx-auto z-20">
<div class="flex items-center gap-2">
<div class="bg-primary p-1.5 rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">trophy</span>
</div>
<span class="font-extrabold text-xl tracking-tight text-slate-900 dark:text-white">Reto Memorial</span>
</div>
<button class="text-slate-500 dark:text-slate-400 font-semibold text-sm hover:text-primary transition-colors">Saltar</button>
</header>
<!-- Main Content / Cards Section -->
<main class="flex-1 flex flex-col items-center justify-center relative overflow-hidden px-4">
<!-- Dynamic Cards Composition -->
<div class="relative w-full max-w-md aspect-[4/5] perspective-1000 flex items-center justify-center mb-12">

<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex flex-col justify-end p-4">
<p class="text-white text-xs font-bold uppercase tracking-widest opacity-70">Velocidad</p>
<p class="text-white text-sm font-semibold italic">Silver Edition</p>
</div>
</div>
<!-- Background Card Right -->
<div class="absolute right-4 w-48 aspect-[2/3] rounded-2xl overflow-hidden shadow-2xl card-rotate-right z-0 opacity-60 transition-transform duration-700 hover:scale-105 border-4 border-slate-200 dark:border-slate-800">
<img class="w-full h-full object-cover" data-alt="Yoga practitioner in a professional studio setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBvGZhhoGOv9_bzNRtIl1vAw5NmMCyxKmjc6coIk68Me1aVad3pHnsg99iSLP0Heb4zbWGCLrEtkSAuoWkKdNsMTY1GFatwO8psZoYMs9Cwc9CO6HWB5ShEARAeoQo_Y29iEJIa7QemPs6kY1jJuCvAYyyS9hPQTrelsveMDbOGH0sXvZeKj9-EyhZzmBZxXoUANL6P7G3DkE071IetkGBmz00QEMGiVyQlX54qSkRLqkHvWHBrOQHGLF_FbM9B-78_IQFTSdRZUc"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex flex-col justify-end p-4">
<p class="text-white text-xs font-bold uppercase tracking-widest opacity-70">Equilibrio</p>
<p class="text-white text-sm font-semibold italic">Pro Card</p>
</div>
</div>
<!-- Main Central Card -->
<div class="relative w-64 aspect-[2/3] rounded-[2rem] overflow-hidden shadow-[0_20px_50px_rgba(236,91,19,0.3)] dark:shadow-[0_20px_50px_rgba(236,91,19,0.15)] z-10 card-center border-[6px] border-white dark:border-slate-900 group">
<img class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" data-alt="Focused athlete lifting weights in a gym" src="https://lh3.googleusercontent.com/aida-public/AB6AXuADsLVY01Oa0C2TQW6QIrXrWR_vt6-ZloLztnXnm50XMA-6HiEhrQhHdgLCHNz1TgxExfITWfwIygcX7G3pU4N_5bYfU4_5C6W_MugnU8jz8FIFv3zPhSn2CthZHuAa3yMRL-D-hpZHuLeCAapGlEpQdLRePA4NtwLWqMi_oRkLMaS1cGeS2bOiDncYIlzvvZOdHbCCGKEoEEi_0qsiqiuRPINyLfHQ2l39ZSwI5Zu0jsCQCreS7ANKtjZbOyLrRfdjhAwiR7bLwOs"/>
<!-- Card Overlays -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/90 via-transparent to-transparent opacity-60"></div>
<div class="absolute inset-0 flex flex-col justify-between p-6">
<div class="flex justify-between items-start">
<div class="bg-white/90 dark:bg-slate-900/90 rounded-lg px-3 py-1 text-xs font-bold text-primary shadow-sm">NIVEL 42</div>
<span class="material-symbols-outlined text-white drop-shadow-md">star</span>
</div>
<div class="text-white">
<p class="text-[10px] font-black uppercase tracking-[0.3em] mb-1 drop-shadow-md">Leyenda</p>
<h3 class="text-2xl font-extrabold leading-tight drop-shadow-lg uppercase tracking-tight">Fuerza Pura</h3>
</div>
</div>
<!-- Shimmer Effect -->
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
</div>
</div>
<!-- Copy Text -->
<div class="text-center px-8 z-20 space-y-3">
<h1 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white tracking-tighter leading-none">
                BIENVENIDO AL <br/>
<span class="text-primary italic">RETO MEMORIAL</span>
</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-medium max-w-xs mx-auto">
                Únete a la competición más exigente y colecciona la gloria en cada desafío.
            </p>
</div>
<!-- Pagination Dots -->
<div class="flex items-center justify-center gap-3 py-10 z-20">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
</main>
<!-- Bottom Actions -->
<footer class="p-8 w-full max-w-md mx-auto z-20">
<button class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-5 rounded-full shadow-xl hover:scale-[1.02] active:scale-95 transition-all duration-200 uppercase tracking-widest text-sm flex items-center justify-center gap-2">
            Comenzar Reto
            <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
<div class="mt-4 text-center">
<p class="text-xs text-slate-400 font-medium">¿Ya tienes cuenta? <a class="text-primary font-bold" href="#">Inicia sesión</a></p>
</div>
</footer>
<!-- Abstract Background Elements -->
<div class="fixed top-[-10%] right-[-10%] w-80 h-80 bg-primary/10 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-80 h-80 bg-primary/10 rounded-full blur-[100px] -z-10"></div>
</body></html>
